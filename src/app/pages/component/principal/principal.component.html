<main class="snap-container">

    <!-- 1. Hero Section -->
    <section class="snap-section">
        <app-hero></app-hero>
    </section>

    <!-- Featured Products Dynamic Section -->
    <section class="py-5" style="background-color: var(--bg-dark, #0a0a0a);">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="fw-bold" style="color: #ffffff !important;">Novedades en Cava</h2>
                <p style="color: rgba(255, 255, 255, 0.75) !important;">Descubre nuestras últimas incorporaciones</p>
            </div>
            <div class="row g-4">
                <div class="col-md-4" *ngFor="let product of featuredProducts">
                    <div class="card h-100 rounded-4 overflow-hidden" style="background: var(--bg-card, rgba(30, 30, 30, 0.6)); border: 1px solid var(--glass-border, rgba(255, 255, 255, 0.08)) !important; backdrop-filter: blur(20px); transition: var(--transition, all 0.4s ease);">
                        <img [src]="product.image" class="card-img-top" [alt]="product.name" style="height: 200px; object-fit: cover;">
                        <div class="card-body d-flex flex-column">
                            <h5 class="fw-bold" style="color: #ffffff !important;">{{product.name}}</h5>
                            <p class="small" style="color: rgba(255, 255, 255, 0.75) !important;">{{product.description | slice:0:60}}...</p>
                            <div class="mt-auto">
                                <a [routerLink]="['/producto', product.id]" class="btn btn-outline-primary btn-sm rounded-pill" style="color: var(--primary, #FFD700) !important; border-color: var(--primary, #FFD700) !important;">
                                    Saber más
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="text-center mt-5">
                <a routerLink="/catalogo" class="btn btn-cheese btn-lg rounded-pill px-5">Ver Catálogo Completo</a>
            </div>
        </div>
    </section>

    <!-- 2. Funciones Section (Radar + Chat) -->
    <section class="snap-section" id="features">
        <app-funciones></app-funciones>
    </section>

    <!-- 3. Funcionamiento Section -->
    <section class="snap-section" id="funcionamiento">
        <app-funcionamiento></app-funcionamiento>
    </section>

    <!-- 4. Vistazo Section -->
    <section class="snap-section" id="vistazo">
        <app-vistazo></app-vistazo>
    </section>

    <!-- 5. Promo Premium Section -->
    <app-promo-premium></app-promo-premium>

    <!-- 6. Download Section -->
    <app-download-section></app-download-section>

</main>

<!-- Modal de Planes -->
<app-planes></app-planes>
