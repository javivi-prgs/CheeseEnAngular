<div class="container mt-5 pt-5">
    <div class="row">
        <!-- Formulario -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">{{ editando ? 'Editar' : 'Nuevo' }} Producto</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="guardar()">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" name="nombre" [(ngModel)]="productoActual.nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" class="form-control" name="precio" [(ngModel)]="productoActual.precio" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" class="form-control" name="stock" [(ngModel)]="productoActual.stock" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Guardar</button>
                            <button type="button" class="btn btn-secondary" (click)="cancelar()" *ngIf="editando">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Listado -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Inventario de Productos</h5>
                    <span class="badge bg-info">Vista: v_inventario_completo</span>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Categoría</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let p of productos">
                                <td>{{ p.producto || p.nombre }}</td>
                                <td>{{ p.precio | currency:'EUR' }}</td>
                                <td>{{ p.stock }}</td>
                                <td>{{ p.categoria || 'Sin cat.' }}</td>
                                <td>
                                    <button class="btn btn-sm btn-warning me-2" (click)="editar(p)">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger" (click)="eliminar(p.id)">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
