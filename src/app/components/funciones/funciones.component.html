<section class="funciones-section py-4 w-100">
    <div class="container text-center mb-5">
        <h2 class="display-4 fw-black text-white">Funciones</h2>
    </div>

    <div class="container">
        <!-- Radar Section -->
        <div class="row align-items-center mb-5 pb-5">
            <div class="col-md-6 d-flex justify-content-center mb-4 mb-md-0">
                <div class="radar-container">
                    <div class="radar-grid"></div>
                    <div class="radar-sweep"></div>
                    <div class="radar-blip" style="top: 20%; left: 30%; animation-delay: 1s;"></div>
                    <div class="radar-blip" style="top: 60%; left: 70%; animation-delay: 2.5s;"></div>
                    <div class="radar-blip" style="top: 40%; left: 80%; animation-delay: 0.5s;"></div>
                    <div class="radar-center"></div>
                </div>
            </div>
            <div class="col-md-6 text-center text-md-start">
                <h3 class="h2 fw-bold text-white mb-3">Radar del Amor 📡</h3>
                <p class="lead text-secondary">Define tu radio en kilómetros y mira quién está cerca en tiempo real.</p>
            </div>
        </div>

        <!-- Chat Section -->
        <div class="row align-items-center flex-row-reverse">
            <div class="col-md-6 d-flex justify-content-center mb-4 mb-md-0">
                <div class="chat-mockup p-4 rounded-4 w-100" style="max-width: 400px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);">
                    <div class="chat-bubble received mb-3 p-3 rounded-4 shadow-sm" style="max-width: 80%; background: #222; font-size: 0.9rem;">
                        Hola! Vi que te gusta el queso 🧀
                    </div>
                    <div class="chat-bubble sent ms-auto mb-3 p-3 rounded-4 shadow-sm" style="max-width: 80%; background: var(--primary); color: #000; font-weight: bold; font-size: 0.9rem;">
                        Me encanta! Cuándo vamos por una pizza? 🍕
                    </div>
                    <div class="chat-bubble received p-3 rounded-4 shadow-sm" style="max-width: 80%; background: #222; font-size: 0.9rem;">
                        Jaja me parece un planazo
                    </div>
                </div>
            </div>
            <div class="col-md-6 text-center text-md-end">
                <h3 class="h2 fw-bold text-white mb-3">Chat al Instante 💬</h3>
                <p class="lead text-secondary">Si hay match, la conversación fluye. Sin esperas, directo al grano.</p>
            </div>
        </div>
    </div>
</section>
