<div class="modal fade" id="contactoModal" tabindex="-1" aria-labelledby="contactoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content custom-modal-bg">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4 p-md-5 pt-0">
        <div class="text-center mb-5">
          <h2 class="display-5 fw-black text-primary mb-3">Contáctanos</h2>
          <p class="lead text-light opacity-75">¿Tienes alguna duda o sugerencia? ¡Estamos aquí para escucharte!</p>
        </div>
        
        <form class="contact-form">
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <input type="text" class="form-control custom-input" placeholder="Nombre" required>
            </div>
            <div class="col-md-6">
              <input type="email" class="form-control custom-input" placeholder="Email" required>
            </div>
          </div>
          <div class="mb-3">
            <input type="text" class="form-control custom-input" placeholder="Asunto" required>
          </div>
          <div class="mb-4">
            <textarea class="form-control custom-input" rows="4" placeholder="Mensaje" required></textarea>
          </div>
          <button type="submit" class="btn btn-cheese w-100 py-3 shadow-glow" data-bs-dismiss="modal">Enviar Mensaje</button>
        </form>
      </div>
    </div>
  </div>
</div>
