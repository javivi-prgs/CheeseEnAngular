<header class="hero d-flex align-items-center py-3 py-lg-5 min-vh-100 position-relative overflow-hidden">
    <div class="cheese-drip animate-drip w-100 z-1"></div>

    <div class="container hero-container position-relative z-2 pt-5">
        <div class="row align-items-center">
            <div class="col-lg-6 text-center text-lg-start mb-5 mb-lg-0">
                <h1 class="display-2 fw-black mb-4 hero-title animate-fade-up position-relative z-3">
                    Encuentra a tu <br><span class="highlight-soulmate">media naranja...</span> 
                    <span class="text-white">o tu queso derretido</span>
                </h1>
                <p class="lead text-secondary mb-5 mx-auto mx-lg-0 animate-fade-up" style="animation-delay: 0.2s; opacity: 0; max-width: 500px;">
                    La app de citas más <strong>cremosa</strong>. Radar, Matches y cero tonterías.
                </p>
                <div class="d-flex justify-content-center justify-content-lg-start gap-3 animate-fade-up" style="animation-delay: 0.4s; opacity: 0;">
                    <a href="#" class="store-badge"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="App Store" style="height: 55px;"></a>
                    <a href="#" class="store-badge"><img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play" style="height: 55px;"></a>
                </div>
            </div>
            <div class="col-lg-6 position-relative hero-visual d-flex justify-content-center align-items-center mt-4 mt-lg-0">
                <div class="phone-mockup w-100 z-2" style="max-width: 320px; aspect-ratio: 9/19;">
                    <div class="screen-content map-screen position-relative w-100 h-100 overflow-hidden" style="border-radius: 35px; background: #0a0a0a;">
                        <div class="map-grid position-absolute top-50 start-50 translate-middle" style="width: 200%; height: 200%;"></div>
                        
                        <!-- Ondas de animación -->
                        <div class="pulse-ripple animate-pulse-ripple"></div>
                        <div class="pulse-ripple animate-pulse-ripple" style="animation-delay: 1s;"></div>
                        <div class="pulse-ripple animate-pulse-ripple" style="animation-delay: 2s;"></div>
                        
                        <!-- Marcador de usuario -->
                        <div class="user-marker position-absolute top-50 start-50 translate-middle rounded-circle z-3 bg-primary" style="width: 15px; height: 15px; box-shadow: 0 0 20px var(--primary);"></div>
                        
                        <!-- UI Bottom -->
                        <div class="map-ui-bottom position-absolute bottom-0 start-50 translate-middle-x mb-4 z-3">
                            <button class="btn btn-outline-primary btn-sm rounded-pill px-3 py-1 bg-black text-primary border-primary fw-bold" style="font-size: 0.7rem; letter-spacing: 1px;">
                                Explorando...
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
