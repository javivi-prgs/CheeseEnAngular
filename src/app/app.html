<!-- Navegación Fija -->
<app-header></app-header>

<main class="snap-container">
    
    <!-- 1. Hero Section -->
    <section class="snap-section">
        <app-hero></app-hero>
    </section>

    <!-- 2. Radar Section -->
    <section class="snap-section" id="features">
        <app-content-section 
            titulo="Radar del Amor 📡" 
            descripcion="Define tu radio en kilómetros y mira quién está cerca en tiempo real." 
            tipo="radar">
        </app-content-section>
    </section>

    <!-- 3. Chat Section -->
    <section class="snap-section">
        <app-content-section 
            titulo="Chat al Instante 💬" 
            descripcion="Si hay match, la conversación fluye. Sin esperas, directo al grano." 
            tipo="chat"
            [reversible]="true">
        </app-content-section>
    </section>

    <!-- 4. Promo Premium Section -->
    <section class="snap-section" id="planes" style="background: radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.1) 0%, #0a0a0a 100%);">
        <div class="container text-center">
            <h2 class="display-3 fw-black mb-4">🧀 Cheese Gold y Platinum</h2>
            <p class="lead mb-5 text-white-50 mx-auto" style="max-width: 700px;">
                Pásate al lado dorado. Likes ilimitados, ve a quién le gustas y rebobina si te equivocaste.
            </p>
            <button class="btn btn-cheese px-5 py-3">Ver Planes</button>
        </div>
    </section>

    <!-- 5. Download Section -->
    <section class="snap-section" id="download">
        <div class="container text-center">
            <h2 class="display-4 fw-black mb-3">¿Listo para derretirte?</h2>
            <p class="lead mb-5 text-white-50">Descarga Cheese hoy mismo y empieza a conectar.</p>
            <button class="btn btn-cheese btn-lg px-5">Descargar Ahora</button>
        </div>
    </section>

    <!-- 6. Footer Section -->
    <section class="snap-section">
        <app-footer></app-footer>
    </section>

</main>

<router-outlet />
